name: skill-forge

on:
  push:
    paths:
      - 'plugins/example-skills/skills/skill-forge/**'
      - '.github/workflows/skill-forge.yml'
  pull_request:
    paths:
      - 'plugins/example-skills/skills/skill-forge/**'
      - '.github/workflows/skill-forge.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Verify skill-forge scripts
        run: bash plugins/example-skills/skills/skill-forge/scripts/ci/verify.sh

  verify-skill-md:
    runs-on: ubuntu-latest
    if: |
      vars.SKILL_EVAL_ENABLED == 'true' &&
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Verify SKILL.md trigger eval
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: bash plugins/example-skills/skills/skill-forge/scripts/ci/verify_skill_md.sh
