name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "${INPUT_TAG}" ]; then
            echo "value=${INPUT_TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=${REF_NAME}" >> "${GITHUB_OUTPUT}"
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.value }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: ai-tools ${{ steps.tag.outputs.value }}
          generate_release_notes: true
          draft: false
          prerelease: false
